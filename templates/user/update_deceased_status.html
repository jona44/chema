{% extends 'base.html' %}

{% block content %}
<div class="container d-flex mt-5 justify-content-center">
      
  <div>
    <h2>Update Deceased Status for {{ profile.user.username }}</h2>
        <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Update</button>
        </form>
  
  <a href="{% url 'member_detail' pk=profile.user.id %}">Back to Member Detail</a>

  </div>
 
</div>
{% endblock %}
