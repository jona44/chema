{% extends 'partials/base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}

<div class="container  mt-5">
 <div class="card">
    <div class="card-header">
      <h1 class="card-title  "><span class="text-blue">Create a group</span></h1>
    </div>
    <div class="card-body">
      <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class=" bt-outline-orange">Create a group</button>
     </form>
    </div>
  </div>
</div>
{% endblock %}
