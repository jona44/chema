{% extends 'base.html' %}
{% load crispy_forms_tags %}

 {% block content %}
 <div class="container d-flex justify-content-center mt-5">
    <div class="card p-3">
     
        <h1> Reply To Comment</h1>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}

        </form>
    </div>
    
</div>

{% endblock %}
