{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
   <div class=" container  mt-5 pt-5">
      <div class="card">
         <div class="card-header">
          <h2 class="card-title">Add Dependents</h2>
         </div>
         <div class="card-body">
            <form method="post">
                  {% csrf_token %}
                  {{ formset.management_form }}
                  {% for form in formset %}
                  <div class="d-flex gap-1 shadow  mb-3 bg-body-tertiary rounded">
                     {{form|crispy}}
                  </div>
                  {% endfor %}
                  <button type="submit" class="btn  bg-success-subtle ">Save</button>
            </form>
        </div>
      </div>
   </div>
   
{% endblock %}
