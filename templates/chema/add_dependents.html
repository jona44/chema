{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
   <div class=" container  mt-5 pt-5">
      <div class="d-grid mb-2 border rouded p-2 self-align-center">
        <h4>Add Dependents</h4>
      </div class="card">
      <div class="d-flex justify-content-center">
         <form method="post">
               {% csrf_token %}
               {{ formset.management_form }}
               {% for form in formset %}
               <div class="d-flex gap-2 shadow p-3 mb-3 bg-body-tertiary rounded">
                  {{form|crispy}}
               </div>
               {% endfor %}
               <button type="submit" class="btn  bg-success-subtle ">Save</button>
         </form>
      </div>
     
   </div>
   
{% endblock %}
