{% load static %}

<nav class="navbar navbar-expand-lg fixed-top bg-success mb-5">
  <div class="container">
    <a class="navbar-brand text-white" href="{% url 'home'%}"><h3>Chema</h3></a>
  
    <div class="btn">
      
      <a href="{% url 'create_group'%}"  class="badge rounded-pill text-bg-primary ">Create Group</a>
      <a href="{% url 'join_existing_group'%}"  class="badge rounded-pill text-bg-secondary ">Join Group</a>
      
    </div>
    
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="w-50 text-center">
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      </div>
    </div>
    
    <!-- Profile links with responsive class -->
    <div class="profile navbar-nav ">
      {% if user.is_authenticated %}
        <a class="nav-item nav-link" href="{% url 'profile' %}">Profile</a>
        <a class="nav-item nav-link" href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a class="nav-item nav-link" href="{% url 'login' %}">Login</a>
        
      {% endif %}
    </div>
  </div>
</nav>
