{% load static %}
<nav class="navbar navbar-expand-lg fixed-top bg-success mb-5">
  <div class="container">
    <a class="navbar-brand text-white" href="{% url 'home'%}"><h3>Chema</h3></a>
   
    
    <div class="btn-toolbar" role="toolbar" aria-label="Toolbar with button groups">
      <div class="btn-group me-2" role="group" aria-label="First group">
        <button type="button" class="btn btn"><span class="material-symbols-outlined">
          join
          </span></button>
        <button type="button" class="btn btn"><span class="material-symbols-outlined">
          group_add
          </span></button>
        <button type="button" class="btn btn"><span class="material-symbols-outlined">
          person_add
          </span></button>
        <button type="button" class="btn btn"><span class="material-symbols-outlined">
          post_add
          </span></button>
      </div>
      
      <div class="btn-group" role="group" aria-label="Third group">
        <button type="button" class="btn btn-info">8</button>
      </div>
    </div>

    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="w-50 text-center">
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      </div>
    </div>
    
    <!-- Profile links with responsive class -->
    <div class="profile navbar-nav ">
      {% if user.is_authenticated %}
        <a class="nav-item nav-link" href="{% url 'profile' %}">Profile</a>
        <a class="nav-item nav-link" href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a class="nav-item nav-link" href="{% url 'login' %}">Login</a>
        
      {% endif %}
    </div>
  </div>
</nav>
