{% extends "base.html" %}
{% load crispy_forms_tags %}
{% load static %}

{% block sidebar-left %}
{% endblock %} 

{% block content %}

<div class="container d-flex justify-content-center mt-5">
    <div class="card"> 
       <div class="card-header"><h2>Create a group</h2></div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                    {{ form|crispy }}
                    <input type="hidden" name="cover_image" value="{{ form.instance.cover_image}}">
                <button type="submit" class="btn btn-secondary">Create Group</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% block sidebar-right %}
{% endblock %}
