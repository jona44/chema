{% extends 'base.html' %}

{% block content %}
<div class="container">
 <h2>My Groups</h2>
  {% for group in groups %}
  
    <div>
      <h3>{{ group.name }}</h3>
      <p>{{ group.description }}</p>
      <p>{{ group.member }}</p>
    </div>
  {% empty %}
    <p>You are not a member of any groups.</p>
  {% endfor %}
</div>
 

{% endblock %}
