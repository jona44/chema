{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
      <h1>{{ object }}</h1>
  <p>Member of the following groups:</p>
  <ul>
    {% for group in groups %}
      <li>
        {{ group.name }}
        {% if object in group.group_admins.all %}
          (Admin)
        {% endif %}
        (Joined on {{ group.date }})
      </li>
    {% endfor %}
  </ul>
</div>

{% endblock %}
