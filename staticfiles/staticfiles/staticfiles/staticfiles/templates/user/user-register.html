{% extends 'base.html'%}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5 pt-5 d-flex justify-content-center">
  <div class="login textcolor">
   
           <button class="btn btn-info "><h4> Sign in below </h4> </button>
              <form method="POST">
                {% csrf_token %}
                <div class="form-group">
             
                 {{ form|crispy}}
                  
                </div>
                <div class="form-group">
                  <button class="btn btn-outline-info" type="submit">Register</button>
                </div>
              </form>   
          </div>
      </div> 
   

{% endblock %}
