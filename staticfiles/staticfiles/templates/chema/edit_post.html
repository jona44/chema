{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="mt-5 pt-5">
        <h1>Edit Post</h1>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
{% endblock %}
