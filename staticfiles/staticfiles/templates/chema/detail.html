<!-- group_detail.html -->
{% extends 'base.html' %}

{% block content %}
    <div class="mt-5 pt-5 w-25">
        <h1>{{ item.name }}</h1>
     <figcaption><img src="{{item.cover_photo.url}}" width="200" alt=""></figcaption> 
          <strong>Group Admins:</strong><p> {{item.admin }}</p>
      
          <strong>Description:</strong> 
          <div class="card p-3">
             <p>{{ item.description }}</p>
          </div> 

            {% if user not in group.members.all %}
                <a href="{% url 'join_group' group_id=group.id %}" class="btn btn-primary">Join Group</a>
            {% else %}
                <p>You are already a member of this group.</p>
            {% endif %}
    </div>
    
{% endblock %}
