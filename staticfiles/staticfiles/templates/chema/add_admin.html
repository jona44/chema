{% extends 'base.html' %}

{% block content %}
<div>
        <h1>Add Admin to {{ group.name }}</h1>

    <form method="post">
        {% csrf_token %}
        <label for="username">Select a member to promote as admin:</label>
        <select name="username" id="username">
        {% for member in group.members.all %}
            <option value="{{ member.username }}">{{ member.username }}</option>
        {% endfor %}
        </select>
        <button type="submit">Add Admin</button>
    </form>
    
    
</div>
 
{% endblock %}
